<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification — ACES</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #f5f0e8 0%, #ece4d0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .verify-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 520px;
    overflow: hidden;
  }
  .verify-header {
    background: #8B1A1A;
    color: white;
    text-align: center;
    padding: 28px 24px 20px;
  }
  .verify-header img {
    height: 60px;
    margin-bottom: 12px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    filter: brightness(0) invert(1);
  }
  .verify-header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .verify-header p {
    font-size: 13px;
    opacity: 0.85;
  }

  .verify-body {
    padding: 28px 32px;
  }

  /* States */
  .state-loading, .state-valid, .state-invalid, .state-error {
    text-align: center;
  }
  .state-loading {
    padding: 20px;
    color: #555;
    font-size: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #eee;
    border-top-color: #8B1A1A;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .icon-valid {
    width: 72px; height: 72px;
    background: #e8f5e9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 40px;
  }
  .icon-invalid {
    width: 72px; height: 72px;
    background: #fde8e8;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    font-size: 40px;
  }

  .state-valid h2 {
    color: #1a7a2e;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .state-invalid h2 {
    color: #8B1A1A;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .state-valid p, .state-invalid p {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .cert-detail-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 14px;
  }
  .cert-detail-table tr {
    border-bottom: 1px solid #f0f0f0;
  }
  .cert-detail-table td:first-child {
    color: #888;
    padding: 9px 0;
    width: 40%;
    font-weight: 500;
  }
  .cert-detail-table td:last-child {
    color: #1a1a1a;
    padding: 9px 0;
    font-weight: 600;
    text-align: right;
  }

  .badge-valid {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f5e9;
    color: #1a7a2e;
    padding: 5px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 14px;
  }
  .badge-invalid {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fde8e8;
    color: #8B1A1A;
    padding: 5px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 14px;
  }

  .verify-footer {
    text-align: center;
    padding: 14px;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="verify-card">
  <div class="verify-header">
    <img src="https://raw.githubusercontent.com/melnahas11111-ctrl/ACES-Workshops/main/aces_logo.png"
         alt="ACES" onerror="this.style.display='none'" />
    <h1>Certificate Verification</h1>
    <p>Ministry of Public Health — State of Qatar</p>
  </div>

  <div class="verify-body" id="verify-body">
    <div class="state-loading">
      <div class="spinner"></div>
      <div>Verifying certificate...</div>
    </div>
  </div>

  <div class="verify-footer">
    ACES Training &bull; Powered by Ministry of Public Health Qatar
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDgRH8Slr3uk0RRZOFZ5LDu1WDBWtgtTRY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://aces-workshops-default-rtdb.firebaseio.com",
  projectId: "aces-workshops",
};

let db;
try {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch(e) {}

async function verifyCert() {
  const params = new URLSearchParams(window.location.search);
  const certNo = params.get('cert');
  const body = document.getElementById('verify-body');

  if (!certNo) {
    body.innerHTML = renderInvalid('No certificate number provided.');
    return;
  }

  if (!db) {
    body.innerHTML = renderError('Database not configured. Please contact the issuer.');
    return;
  }

  try {
    const key = certNo.replace(/-/g, '_');
    const snap = await db.ref(`certificates/${key}`).once('value');
    const data = snap.val();

    if (!data || data.valid === false) {
      body.innerHTML = renderInvalid(certNo);
      return;
    }

    body.innerHTML = renderValid(certNo, data);
  } catch(e) {
    body.innerHTML = renderError('Could not connect to verification server.');
  }
}

function renderValid(certNo, data) {
  const issued = data.issueDate
    ? new Date(data.issueDate).toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' })
    : '—';
  return `
    <div class="state-valid">
      <div class="icon-valid">✅</div>
      <h2>Certificate Verified</h2>
      <p>This is an authentic certificate issued by<br>Ministry of Public Health, State of Qatar</p>
      <span class="badge-valid">✔ AUTHENTIC</span>
      <table class="cert-detail-table">
        <tr><td>Holder Name</td><td>${data.name || '—'}</td></tr>
        <tr><td>Employee ID</td><td>${data.id || '—'}</td></tr>
        <tr><td>Organization</td><td>${data.org || '—'}</td></tr>
        <tr><td>Program</td><td>${data.programName || '—'}</td></tr>
        <tr><td>Certificate No</td><td>${certNo}</td></tr>
        <tr><td>Issue Date</td><td>${issued}</td></tr>
      </table>
    </div>
  `;
}

function renderInvalid(certNo) {
  return `
    <div class="state-invalid">
      <div class="icon-invalid">❌</div>
      <h2>Certificate Not Found</h2>
      <p>Certificate <strong>${certNo}</strong> could not be verified.<br>
      It may be invalid, revoked, or not yet registered.</p>
      <span class="badge-invalid">✖ NOT VERIFIED</span>
    </div>
  `;
}

function renderError(msg) {
  return `
    <div class="state-error" style="text-align:center; padding:20px;">
      <div style="font-size:40px; margin-bottom:12px;">⚠️</div>
      <h2 style="color:#c87000; margin-bottom:8px;">Verification Unavailable</h2>
      <p style="color:#666; font-size:14px;">${msg}</p>
    </div>
  `;
}

verifyCert();
</script>
</body>
</html>
