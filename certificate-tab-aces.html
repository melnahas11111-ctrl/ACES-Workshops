<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تبويب الشهادات - ACES</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- QR Code Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- html2canvas + jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  /* ============================================================
     CERTIFICATES TAB — ACES Dashboard
     يُضاف هذا الكود داخل قسم تبويب "تحميل الشهادات" في الداشبورد
  ============================================================ */

  :root {
    --cert-red: #8B1A1A;
    --cert-red-light: #a52020;
    --cert-gold: #B8860B;
    --cert-border: #8B1A1A;
    --cert-bg: #ffffff;
    --cert-text: #1a1a1a;
    --cert-muted: #666;
  }

  /* ---- Controls Area ---- */
  #cert-controls {
    background: #f9f5f0;
    border: 1px solid #e0d5c5;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  #cert-controls select,
  #cert-controls button {
    padding: 9px 18px;
    border-radius: 7px;
    border: 1.5px solid #c8b89a;
    background: white;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    color: #1a1a1a;
    transition: all 0.2s;
  }
  #cert-controls button {
    background: var(--cert-red);
    color: white;
    border-color: var(--cert-red);
    font-weight: 600;
  }
  #cert-controls button:hover {
    background: var(--cert-red-light);
  }
  #cert-controls button.btn-secondary {
    background: white;
    color: var(--cert-red);
    border-color: var(--cert-red);
  }
  #cert-controls button.btn-secondary:hover {
    background: #fdf0f0;
  }

  /* ---- Trainees Table ---- */
  #cert-trainees-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 28px;
  }
  #cert-trainees-table th {
    background: var(--cert-red);
    color: white;
    padding: 10px 14px;
    text-align: right;
    font-weight: 600;
  }
  #cert-trainees-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #eee;
    color: #333;
    vertical-align: middle;
  }
  #cert-trainees-table tr:hover td {
    background: #fdf5f0;
  }
  #cert-trainees-table tr:nth-child(even) td {
    background: #fafafa;
  }
  #cert-trainees-table tr:nth-child(even):hover td {
    background: #fdf5f0;
  }
  .cert-preview-btn {
    background: var(--cert-red);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    margin-left: 4px;
    transition: all 0.2s;
  }
  .cert-preview-btn:hover { background: var(--cert-red-light); }
  .cert-download-btn {
    background: #1a5c2a;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .cert-download-btn:hover { background: #1e6e32; }

  /* ---- Modal Overlay ---- */
  #cert-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.6);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  }
  #cert-modal-overlay.active {
    display: flex;
  }
  #cert-modal-box {
    background: white;
    border-radius: 12px;
    max-width: 95vw;
    max-height: 95vh;
    overflow-y: auto;
    padding: 20px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  #cert-modal-close {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--cert-red);
    color: white;
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  #cert-modal-download {
    display: block;
    margin: 14px auto 0;
    padding: 11px 32px;
    background: var(--cert-red);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  #cert-modal-download:hover { background: var(--cert-red-light); }

  /* ============================================================
     THE CERTIFICATE TEMPLATE
  ============================================================ */
  #cert-template-wrapper {
    width: 900px;
    margin: 0 auto;
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  .cert-outer {
    width: 900px;
    min-height: 640px;
    background: #fff;
    border: 3px solid var(--cert-red);
    box-shadow: inset 0 0 0 6px #fff, inset 0 0 0 8px var(--cert-red);
    padding: 36px 50px 32px;
    position: relative;
    box-sizing: border-box;
  }

  /* Corner decoration lines */
  .cert-outer::before {
    content: '';
    position: absolute;
    top: 11px; left: 11px; right: 11px; bottom: 11px;
    border: 1px solid var(--cert-red);
    pointer-events: none;
  }

  /* ---- Header ---- */
  .cert-header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1.5px solid #ddd;
  }
  .cert-header-text {
    text-align: center;
  }
  .cert-header-text .cert-ministry-ar {
    font-size: 17px;
    font-weight: bold;
    color: var(--cert-red);
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    margin: 0 0 2px;
  }
  .cert-header-text .cert-ministry-en {
    font-size: 14px;
    font-weight: bold;
    color: var(--cert-red);
    font-family: Arial, sans-serif;
    margin: 0;
  }
  .cert-header-text .cert-state {
    font-size: 12px;
    color: var(--cert-red);
    font-family: Arial, sans-serif;
    margin: 0;
  }
  .cert-logo-moph {
    width: 80px;
    height: 80px;
    object-fit: contain;
  }

  /* ---- Title ---- */
  .cert-title {
    text-align: center;
    font-size: 42px;
    font-weight: 900;
    color: var(--cert-red);
    letter-spacing: 4px;
    font-family: 'Georgia', serif;
    text-transform: uppercase;
    margin: 8px 0 10px;
  }
  .cert-subtitle-italic {
    text-align: center;
    font-style: italic;
    color: #555;
    font-size: 16px;
    margin: 0 0 10px;
    font-family: Georgia, serif;
  }

  /* ---- Trainee Name ---- */
  .cert-name {
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    color: #111;
    font-family: 'Georgia', serif;
    text-transform: capitalize;
    letter-spacing: 2px;
    margin: 8px 0;
  }

  /* ---- Program text ---- */
  .cert-program-line {
    text-align: center;
    font-size: 15px;
    color: #444;
    font-family: Arial, sans-serif;
    margin: 6px 0 4px;
  }
  .cert-program-name {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #111;
    font-family: Arial, sans-serif;
    margin: 4px 0 14px;
  }

  /* ---- Presented By ---- */
  .cert-presented-by {
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    color: #888;
    font-family: Arial, sans-serif;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .cert-aces-logo-area {
    text-align: center;
    margin-bottom: 16px;
  }
  .cert-aces-logo {
    height: 40px;
    object-fit: contain;
  }

  /* ---- Info Box ---- */
  .cert-info-box {
    display: flex;
    justify-content: center;
    border: 1px solid #999;
    margin: 12px 60px;
  }
  .cert-info-cell {
    flex: 1;
    text-align: center;
    padding: 8px 10px;
    border-right: 1px solid #999;
  }
  .cert-info-cell:last-child {
    border-right: none;
  }
  .cert-info-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    display: block;
  }
  .cert-info-value {
    font-size: 16px;
    font-weight: bold;
    color: #111;
    font-family: Arial, sans-serif;
    display: block;
    margin-top: 2px;
  }

  /* ---- QR + Certificate No ---- */
  .cert-qr-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin: 14px 0 18px;
  }
  .cert-cert-no-area {
    text-align: center;
  }
  .cert-cert-no-label {
    font-size: 13px;
    color: #555;
    font-family: Arial, sans-serif;
  }
  .cert-cert-no-value {
    font-size: 15px;
    font-weight: bold;
    color: var(--cert-red);
    font-family: Arial, sans-serif;
    margin-top: 3px;
  }
  .cert-qr-divider {
    width: 1px;
    height: 90px;
    background: #ccc;
  }
  .cert-qr-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .cert-qr-box canvas,
  .cert-qr-box img {
    width: 85px !important;
    height: 85px !important;
  }
  .cert-scan-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    font-family: Arial, sans-serif;
  }

  /* ---- Signatures ---- */
  .cert-signatures {
    display: flex;
    justify-content: space-between;
    padding: 16px 30px 0;
    border-top: 1px solid #ddd;
    margin-top: 10px;
  }
  .cert-sig-item {
    text-align: center;
    flex: 1;
  }
  .cert-sig-line {
    width: 140px;
    border-bottom: 1.5px solid #555;
    margin: 0 auto 6px;
  }
  .cert-sig-name {
    font-size: 13px;
    font-weight: bold;
    color: #111;
    font-family: Arial, sans-serif;
    text-transform: capitalize;
    margin: 0;
  }
  .cert-sig-title {
    font-size: 11px;
    color: #555;
    font-style: italic;
    font-family: Arial, sans-serif;
    margin: 2px 0 0;
  }

  /* ---- Bulk download progress ---- */
  #cert-bulk-progress {
    display: none;
    text-align: center;
    padding: 12px;
    background: #f0f8ff;
    border: 1px solid #b0d4f0;
    border-radius: 8px;
    margin-top: 14px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #1a5080;
  }

  /* Empty state */
  .cert-empty {
    text-align: center;
    padding: 40px;
    color: #888;
    font-size: 15px;
    font-family: Arial, sans-serif;
  }

  /* ---- Verification page styles (used in QR URL) ---- */
</style>

<!-- ============================================================
  PASTE THIS HTML BLOCK INSIDE THE 🎓 تحميل الشهادات SECTION
  IN YOUR DASHBOARD (inside the #tab-certificates div or equivalent)
============================================================ -->

<div id="certificates-tab-content">

  <!-- Controls Row -->
  <div id="cert-controls">
    <label style="font-weight:600; font-family:Arial; font-size:14px; color:#333;">
      اختر الورشة:
    </label>
    <select id="cert-workshop-select" onchange="loadCertTrainees()">
      <option value="">-- اختر ورشة --</option>

    <button onclick="downloadAllCerts()" class="btn-secondary" id="cert-download-all-btn" style="display:none;">

  <!-- Trainees Table -->
  <div id="cert-trainees-container">

  <div id="cert-bulk-progress">

<!-- Certificate Modal (Preview) -->
<div id="cert-modal-overlay" onclick="closeCertModal(event)">
  <div id="cert-modal-box">
    <button id="cert-modal-close" onclick="closeCertModal(null, true)">✕</button>
    <div id="cert-template-wrapper">
      <!-- Certificate renders here -->

      ⬇ تحميل الشهادة PDF

  </div>
</div>

<!-- Hidden QR render area (off-screen) -->
<div id="cert-qr-hidden" style="position:absolute; left:-9999px; top:-9999px;"></div>


<script>
// ============================================================
//  ACES CERTIFICATE MODULE — v2.0
//  يُضاف هذا السكريبت في نهاية ملف index.html
//  أو داخل <script> الموجود في الداشبورد
// ============================================================

// ---- Firebase config (استبدل بإعدادات Firebase الخاصة بك) ----
// إذا كانت Firebase مهيأة بالفعل في الداشبورد، احذف هذا الكود
const CERT_FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// تهيئة Firebase (يُنفَّذ فقط إذا لم يكن Firebase مُهيأً بالفعل)
let certDb;
try {
  if (!firebase.apps.length) {
    firebase.initializeApp(CERT_FIREBASE_CONFIG);
  }
  certDb = firebase.database();
} catch(e) {
  console.warn("Firebase init:", e.message);
}

// ---- Certificate settings ----
// عدّل هذه القيم حسب الورشة الحالية
const CERT_CONFIG = {
  programName: "Advanced Techniques for Food Sampling",
  presenter: "ACES",
  duration: "5 Days",
  startDate: "3 May 2026",
  endDate: "7 May 2026",
  trainingHours: "35 Hours",
  certPrefix: "MOPH-2026",
  verifyBaseUrl: "https://melnahas11111-ctrl.github.io/ACES-Workshops/verify.html",
  // Signatures
  sig1Name: "Wasan Al-Baker",
  sig1Title: "Director of Food Safety Department\nMinistry of Public Health",
  sig2Name: "Ghaleb Al Zubi",
  sig2Title: "Branch Manager\nACES Doha",
  sig3Name: "Ghanim Al-mohannadi",
  sig3Title: "Director of Human Resources Department\nMinistry of Public Health",
  // Logos (ضع روابط صور الشعارات)
  mophLogoUrl: "https://raw.githubusercontent.com/melnahas11111-ctrl/ACES-Workshops/main/moph_logo.png",
  acesLogoUrl: "https://raw.githubusercontent.com/melnahas11111-ctrl/ACES-Workshops/main/aces_logo.png",
};

// Current trainee being previewed
let _currentCertTrainee = null;
let _currentWorkshopData = null;

// ---- Load workshops into dropdown ----
function loadCertWorkshops() {
  if (!certDb) { loadWorkshopsFromDOM(); return; }
  certDb.ref('workshops').once('value').then(snap => {
    const workshops = snap.val() || {};
    const sel = document.getElementById('cert-workshop-select');
    sel.innerHTML = '<option value="">-- اختر ورشة --</option>';
    Object.keys(workshops).forEach(key => {
      const w = workshops[key];
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = w.name || key;
      opt.dataset.workshop = JSON.stringify(w);
      sel.appendChild(opt);
    });
  });
}

// Fallback: load workshops from existing DOM data
function loadWorkshopsFromDOM() {
  // If the dashboard already has workshop data in JS variables, use them
  const sel = document.getElementById('cert-workshop-select');
  if (typeof workshops !== 'undefined' && workshops) {
    sel.innerHTML = '<option value="">-- اختر ورشة --</option>';
    Object.keys(workshops).forEach(key => {
      const w = workshops[key];
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = w.name || key;
      opt.dataset.workshop = JSON.stringify(w);
      sel.appendChild(opt);
    });
  }
}

// ---- Load trainees for selected workshop ----
function loadCertTrainees() {
  const sel = document.getElementById('cert-workshop-select');
  const workshopId = sel.value;
  if (!workshopId) {
    document.getElementById('cert-trainees-container').innerHTML =
      '<div class="cert-empty">اختر ورشة لعرض المتدربين وتحميل شهاداتهم</div>';
    document.getElementById('cert-download-all-btn').style.display = 'none';
    document.getElementById('cert-print-all-btn').style.display = 'none';
    document.getElementById('cert-count-badge').style.display = 'none';
    return;
  }

  const selectedOpt = sel.options[sel.selectedIndex];
  try { _currentWorkshopData = JSON.parse(selectedOpt.dataset.workshop || '{}'); } catch(e) {}

  if (certDb) {
    certDb.ref(`workshops/${workshopId}/trainees`).once('value').then(snap => {
      const trainees = snap.val() || {};
      renderCertTraineesTable(trainees, workshopId);
    });
  } else {
    // Use global trainees data if Firebase not available
    const trainees = (typeof workshops !== 'undefined' && workshops[workshopId])
      ? (workshops[workshopId].trainees || {}) : {};
    renderCertTraineesTable(trainees, workshopId);
  }
}

// ---- Render Trainees Table ----
function renderCertTraineesTable(trainees, workshopId) {
  const keys = Object.keys(trainees);
  const container = document.getElementById('cert-trainees-container');
  const badge = document.getElementById('cert-count-badge');

  if (!keys.length) {
    container.innerHTML = '<div class="cert-empty">لا يوجد متدربون في هذه الورشة</div>';
    badge.style.display = 'none';
    return;
  }

  badge.textContent = `${keys.length} متدرب`;
  badge.style.display = 'inline-block';
  document.getElementById('cert-download-all-btn').style.display = 'inline-block';
  document.getElementById('cert-print-all-btn').style.display = 'inline-block';

  let rows = keys.map((key, i) => {
    const t = trainees[key];
    const certNo = generateCertNumber(workshopId, key, i);
    return `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${t.name || '—'}</strong></td>
        <td>${t.id || '—'}</td>
        <td>${t.org || t.department || '—'}</td>
        <td>
          <span style="
            font-family: monospace;
            font-size: 12px;
            color: var(--cert-red);
            font-weight: bold;
          ">${certNo}</span>
        </td>
        <td>
          <button class="cert-preview-btn"
            onclick="previewCert(${JSON.stringify(t).replace(/"/g, '&quot;')}, '${certNo}')">
            👁 معاينة
          </button>
          <button class="cert-download-btn"
            onclick="quickDownloadCert(${JSON.stringify(t).replace(/"/g, '&quot;')}, '${certNo}')">
            ⬇ تحميل
          </button>
        </td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table id="cert-trainees-table">
      <thead>
        <tr>
          <th>#</th>
          <th>اسم المتدرب</th>
          <th>الرقم الوظيفي</th>
          <th>الجهة</th>
          <th>رقم الشهادة</th>
          <th>الشهادة</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ---- Generate Certificate Number ----
function generateCertNumber(workshopId, traineeKey, index) {
  const year = new Date().getFullYear();
  const seq = String(index + 1).padStart(4, '0');
  return `MOPH-${year}-${seq}`;
}

// ---- Build Certificate HTML ----
function buildCertHTML(trainee, certNo, qrDataUrl) {
  const ws = _currentWorkshopData || {};
  const programName = ws.programName || CERT_CONFIG.programName;
  const duration = ws.duration || CERT_CONFIG.duration;
  const startDate = ws.startDate || CERT_CONFIG.startDate;
  const endDate = ws.endDate || CERT_CONFIG.endDate;
  const trainingHours = ws.trainingHours || CERT_CONFIG.trainingHours;
  const verifyUrl = `${CERT_CONFIG.verifyBaseUrl}?cert=${certNo}`;

  const qrHtml = qrDataUrl
    ? `<img src="${qrDataUrl}" style="width:85px;height:85px;" />`
    : `<div style="width:85px;height:85px;border:2px solid #999;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;">QR</div>`;

  return `
<div class="cert-outer">
  <!-- Header -->
  <div class="cert-header">
    <img src="${CERT_CONFIG.mophLogoUrl}"
         class="cert-logo-moph"
         onerror="this.style.display='none'"
         alt="MOPH Logo" />
    <div class="cert-header-text">
      <p class="cert-ministry-ar">وزارة الصحـة العامـة</p>
      <p class="cert-ministry-en">Ministry of Public Health</p>
      <p class="cert-state">State of Qatar &bull; دولـة قطـر</p>
    </div>
  </div>

  <!-- Title -->
  <div class="cert-title">Training Certificate</div>

// ---- Generate QR Code as Data URL ----
function generateQR(text) {
  return new Promise((resolve) => {
    const container = document.getElementById('cert-qr-hidden');
    container.innerHTML = '';
    try {
      const qr = new QRCode(container, {
        text: text,
        width: 120,
        height: 120,
        colorDark: '#8B1A1A',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      setTimeout(() => {
        const canvas = container.querySelector('canvas');
        const img = container.querySelector('img');
        if (canvas) {
          resolve(canvas.toDataURL('image/png'));
        } else if (img) {
          resolve(img.src);
        } else {
          resolve(null);
        }
      }, 300);
    } catch(e) {
      console.error('QR error:', e);
      resolve(null);
    }
  });
}

// ---- Preview Certificate in Modal ----
async function previewCert(trainee, certNo) {
  _currentCertTrainee = { trainee, certNo };
  const verifyUrl = `${CERT_CONFIG.verifyBaseUrl}?cert=${certNo}`;
  const qrDataUrl = await generateQR(verifyUrl);

  const wrapper = document.getElementById('cert-template-wrapper');
  wrapper.innerHTML = buildCertHTML(trainee, certNo, qrDataUrl);

  const overlay = document.getElementById('cert-modal-overlay');
  overlay.classList.add('active');
}

function closeCertModal(e, force) {
  if (force || (e && e.target === document.getElementById('cert-modal-overlay'))) {
    document.getElementById('cert-modal-overlay').classList.remove('active');
  }
}

// ---- Download current certificate ----
async function downloadCurrentCert() {
  if (!_currentCertTrainee) return;
  const { trainee, certNo } = _currentCertTrainee;
  await exportCertPDF(trainee, certNo,
    document.getElementById('cert-template-wrapper').querySelector('.cert-outer'));
}

// ---- Quick download without preview ----
async function quickDownloadCert(trainee, certNo) {
  const verifyUrl = `${CERT_CONFIG.verifyBaseUrl}?cert=${certNo}`;
  const qrDataUrl = await generateQR(verifyUrl);

  // Build temp element
  const tmp = document.createElement('div');
  tmp.style.cssText = `
    position: absolute; left: -9999px; top: 0;
    width: 900px; font-family: Georgia, serif;
  `;
  tmp.innerHTML = buildCertHTML(trainee, certNo, qrDataUrl);
  document.body.appendChild(tmp);

  await exportCertPDF(trainee, certNo, tmp.querySelector('.cert-outer'));
  document.body.removeChild(tmp);
}

// ---- Export PDF using html2canvas + jsPDF ----
async function exportCertPDF(trainee, certNo, element) {
  if (!element) { alert('خطأ في عرض الشهادة'); return; }

  try {
    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });

    const pageWidth = 297;
    const pageHeight = 210;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgAspect = canvas.width / canvas.height;
    let drawW = pageWidth - 20;
    let drawH = drawW / imgAspect;
    if (drawH > pageHeight - 10) {
      drawH = pageHeight - 10;
      drawW = drawH * imgAspect;
    }
    const x = (pageWidth - drawW) / 2;
    const y = (pageHeight - drawH) / 2;

    pdf.addImage(imgData, 'JPEG', x, y, drawW, drawH);
    const safeName = (trainee.name || 'certificate').replace(/\s+/g, '_');
    pdf.save(`${certNo}_${safeName}.pdf`);
  } catch(e) {
    console.error('PDF error:', e);
    alert('حدث خطأ أثناء إنشاء PDF. تأكد من تحميل المكتبات.');
  }
}

// ---- Download ALL certificates ----
async function downloadAllCerts() {
  const sel = document.getElementById('cert-workshop-select');
  const workshopId = sel.value;
  if (!workshopId) return;

  const rows = document.querySelectorAll('#cert-trainees-table tbody tr');
  if (!rows.length) return;

  const progress = document.getElementById('cert-bulk-progress');
  const progressText = document.getElementById('cert-progress-text');
  const progressBar = document.getElementById('cert-progress-bar');
  progress.style.display = 'block';

  for (let i = 0; i < rows.length; i++) {
    progressText.textContent = `جاري تحميل شهادة ${i + 1} من ${rows.length}...`;
    progressBar.style.width = `${Math.round((i / rows.length) * 100)}%`;

    // Extract data from row
    const cells = rows[i].querySelectorAll('td');
    const name = cells[1]?.textContent?.trim() || '';
    const id = cells[2]?.textContent?.trim() || '';
    const org = cells[3]?.textContent?.trim() || '';
    const certNo = cells[4]?.textContent?.trim() || '';

    await quickDownloadCert({ name, id, org }, certNo);
    await new Promise(r => setTimeout(r, 800));
  }

  progressBar.style.width = '100%';
  progressText.textContent = `✅ تم تحميل ${rows.length} شهادة بنجاح`;
  setTimeout(() => { progress.style.display = 'none'; }, 3000);
}

// ---- Print All ----
function printAllCerts() {
  alert('سيتم فتح نافذة الطباعة. تأكد من ضبط الحجم على A4 أفقي.');
  window.print();
}

// ---- Save certificate info to Firebase (for QR verification) ----
function saveCertToFirebase(certNo, trainee, workshopId) {
  if (!certDb) return;
  const verifyData = {
    name: trainee.name || '',
    id: trainee.id || '',
    org: trainee.org || '',
    workshopId: workshopId,
    certNo: certNo,
    programName: CERT_CONFIG.programName,
    issueDate: new Date().toISOString(),
    valid: true
  };
  certDb.ref(`certificates/${certNo.replace(/-/g, '_')}`).set(verifyData)
    .then(() => console.log('Certificate saved:', certNo))
    .catch(e => console.error('Save error:', e));
}
